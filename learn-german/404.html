<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>독일어 공부</title>
  <script>
    // Redirect deep links back to the SPA
    var path = window.location.pathname.replace('/learn-german', '');
    var query = window.location.search;
    var hash = window.location.hash;
    var redirectUrl = '/learn-german/?redirect=' + encodeURIComponent(path + query + hash);
    window.location.replace(redirectUrl);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
